<!DOCTYPE html>
<html>
<head>
    <title>Phishing URL Detector</title>
</head>
<body>

<h1>Phishing URL Detector</h1>

<form action="/predict" method="POST">

    <input
        type="text"
        name="url"
        placeholder="Enter URL"
        required>

    <button type="submit">
        Check URL
    </button>

</form>

{% if prediction %}
    <h2>{{ prediction }}</h2>
    <h3>Confidence: {{ confidence }}%</h3>
{% endif %}

</body>
</html>
